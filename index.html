<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag Manager System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');
        
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }

        /* การจัดรูปแบบตาราง Tag */
        .tag-box {
            width: 100%; height: 100%; border: 2px solid #000;
            border-collapse: collapse; background: #fff; table-layout: fixed;
        }
        .tag-box td { border: 1px solid #000; padding: 4px 8px; font-size: 11px; vertical-align: middle; }
        .tag-box .font-bold { font-weight: 700; }
        .tag-top-label { height: 28px; }
        .tag-top-value { height: 28px; }
        .tag-singleline {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
            line-height: 1.05;
        }
        .part-no-value {
            font-size: 10px !important;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
            line-height: 1.05;
        }
        .tag-company-cell {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 9px !important;
            padding-top: 3px !important;
            padding-bottom: 3px !important;
        }
        .tag-img-container {
            width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .tag-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .tag-v2 .tag-right-panel {
            padding: 0 !important;
        }
        .tag-v2 .tag-right-panel-inner {
            width: 100%; height: 100%; display: flex; flex-direction: column;
        }
        .tag-v2 .tag-id-head {
            border-bottom: 1px solid #000; padding: 4px 8px; font-size: 11px; font-weight: 700;
            text-transform: uppercase; background: #f3f4f6; min-height: 30px; display: flex; align-items: center;
        }
        .tag-v2 .tag-id-value {
            border-bottom: 1px solid #000; padding: 3px 8px; font-size: 11px; font-weight: 700;
            text-align: center; min-height: 28px; display: flex; align-items: center; justify-content: center;
            white-space: nowrap; overflow: hidden; text-overflow: clip;
        }
        .tag-v2 .tag-img-container { height: 42px; }

        /* =========================================
           ตั้งค่าสำหรับการพิมพ์ A4 (ลดขนาดและจัดกลาง)
           ========================================= */
        @page {
            size: A4 portrait;
            margin: 0; /* ให้เบราว์เซอร์เลิกยุ่งกับขอบกระดาษ */
        }
        @media print {
            body { background: #fff; }
            .no-print { display: none !important; }
            
            #print-area {
                display: grid !important;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: repeat(5, 1fr);
                /* ปรับขนาดให้เล็กกว่า A4 จริงเล็กน้อย เพื่อไม่ให้ล้นขอบเครื่องพิมพ์ */
                width: 195mm; 
                height: 282mm;
                margin: 7.5mm auto; /* จัดให้อยู่กึ่งกลางกระดาษ */
                gap: 4mm; /* ลดระยะห่างลง */
                box-sizing: border-box;
                page-break-after: always;
            }
            /* ลดขนาดฟอนต์และช่องว่างลงนิดนึงตอนพิมพ์ */
            .tag-box { border: 1.5px solid #000; }
            .tag-box td { font-size: 10px; padding: 3px 6px; }
            .tag-top-label, .tag-top-value { height: 24px; }
            .part-no-value { font-size: 8.5px !important; }
            .tag-company-cell { font-size: 8.5px !important; padding-top: 2px !important; padding-bottom: 2px !important; }
            .tag-img-container { height: 50px; }
            .tag-v2 td { padding: 2px 5px; }
            .tag-v2 .tag-id-head { min-height: 24px; padding: 2px 6px; font-size: 9px; }
            .tag-v2 .tag-id-value { min-height: 22px; padding: 2px 6px; font-size: 9px; }
            .tag-v2 .tag-img-container { height: 32px; }
        }
    </style>
</head>
<body class="text-gray-800">

    <div class="no-print p-6 max-w-[1400px] mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-gray-800 border-b-2 border-blue-500 pb-2 inline-block">
            <i class="fa-solid fa-tags text-blue-600"></i> TAG MANAGER SYSTEM
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-2 bg-white rounded-xl shadow-lg p-6 w-full overflow-hidden">
                
                <div class="flex flex-col md:flex-row justify-between gap-4 mb-4">
                    <div class="relative w-full md:w-2/3">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                            <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                        </div>
                        <input type="text" id="searchInput" onkeyup="handleSearch()" 
                               class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full pl-12 p-2.5 shadow-sm" 
                               placeholder="ค้นหาชื่อ Model / Part name / Part no.">
                    </div>
                    
                    <div class="flex items-center gap-2 w-full md:w-1/3 justify-end">
                        <label class="text-sm text-gray-600 whitespace-nowrap">แสดง:</label>
                        <select id="itemsPerPage" onchange="changeItemsPerPage()" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2.5 shadow-sm">
                            <option value="15" selected>15 รายการ</option>
                            <option value="30">30 รายการ</option>
                            <option value="50">50 รายการ</option>
                            <option value="all">ทั้งหมด</option>
                        </select>
                    </div>
                </div>

                <div id="loading" class="text-center py-10">
                    <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-500 mb-3"></i>
                    <p class="text-gray-500 text-lg">กำลังโหลดฐานข้อมูล...</p>
                </div>

                <div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm mb-4">
                    <table class="w-full text-sm text-left" id="dataTable" style="display: none;">
                        <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b-2 border-gray-300">
                            <tr>
                                <th class="px-3 py-3">NO.</th>
                                <th class="px-3 py-3">CUSTOMER</th>
                                <th class="px-3 py-3">MODEL</th>
                                <th class="px-3 py-3">PART NAME</th>
                                <th class="px-3 py-3">PART NUMBER</th>
                                <th class="px-3 py-3 text-center">Pcs/Box</th>
                                <th class="px-3 py-3 text-center">ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>

                <div id="pagination" class="flex justify-between items-center text-sm" style="display: none;">
                    <div class="text-gray-600" id="pageInfo">แสดง 1-15 จากทั้งหมด 0 รายการ</div>
                    <div class="flex gap-2">
                        <button onclick="prevPage()" id="btnPrev" class="px-3 py-1 bg-gray-200 hover:bg-gray-300 rounded disabled:opacity-50"><i class="fa-solid fa-chevron-left"></i> ก่อนหน้า</button>
                        <button onclick="nextPage()" id="btnNext" class="px-3 py-1 bg-gray-200 hover:bg-gray-300 rounded disabled:opacity-50">ถัดไป <i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>

            </div>

            <div class="md:col-span-1 bg-white rounded-xl shadow-lg p-6 sticky top-6 self-start w-full">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-desktop text-gray-600"></i> Preview
                </h2>
                
                <div class="mb-4 bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <div class="flex items-center justify-between mb-1">
                        <label class="block text-sm font-semibold text-gray-700">ตั้งค่าวันที่พิมพ์</label>
                        <!-- เพิ่ม Checkbox ไม่แสดงวันที่ ตรงนี้ -->
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="noDateCheck" class="w-4 h-4 cursor-pointer text-blue-600" onchange="updatePreviewUI()">
                            <label for="noDateCheck" class="text-sm cursor-pointer text-gray-700 font-medium">ไม่แสดงวันที่</label>
                        </div>
                    </div>
                    <input type="date" id="printDate" class="w-full border-gray-300 rounded-md shadow-sm p-2" onchange="updatePreviewUI()">
                </div>

                <div id="single-preview-container" class="mb-6 p-4 bg-gray-100 rounded-lg flex justify-center items-center min-h-[250px] shadow-inner">
                    <p class="text-gray-400 text-center">คลิกปุ่ม Preview<br>เพื่อโหลดภาพและดูตัวอย่าง</p>
                </div>

                <button id="printBtn" onclick="triggerPrint()" disabled 
                        class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:bg-blue-700 disabled:bg-gray-300 transition duration-200 flex justify-center items-center gap-2 text-lg">
                    <i class="fa-solid fa-print"></i> พิมพ์ A4 (10 แผ่น)
                </button>
            </div>
            
        </div>
    </div>

    <div id="print-area" style="display: none;"></div>

    <script>
        // =========================================================
        // 🔴 ใส่ URL Google Apps Script ที่นี่
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFw17n7qiGq8tnYBtBqqh0q6QbBxL-ud5lEx1RBzdPodv5w2gqY_kAcy5FYWHOGWujHQ/exec"; 
        // =========================================================
        
        let allData = [];
        let filteredData = [];
        let selectedItem = null;

        // การตั้งค่า Pagination
        let currentPage = 1;
        let itemsPerPage = 15;

        // =========================================================
        // อัปเดต: ระบบ Caching โหลดไว 0.1 วิ และอัปเดตเบื้องหลัง
        // =========================================================
        window.onload = async () => {
            document.getElementById('printDate').valueAsDate = new Date();
            
            // 1. ดึงข้อมูลจาก Cache ในเครื่องก่อน
            const cachedData = localStorage.getItem('tagManagerDB');
            if (cachedData) {
                allData = JSON.parse(cachedData);
                filteredData = [...allData];
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dataTable').style.display = 'table';
                document.getElementById('pagination').style.display = 'flex';
                renderTable(); 
            }

            // 2. แอบไปวิ่งดึงข้อมูลใหม่จาก Google Sheets เบื้องหลัง
            try {
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error("Network error");
                const freshData = await response.json();
                
                // 3. เทียบข้อมูล ถ้ามีอัปเดตให้เซฟและแสดงผลใหม่เนียนๆ
                if (JSON.stringify(freshData) !== JSON.stringify(allData)) {
                    allData = freshData;
                    
                    const query = document.getElementById('searchInput').value.trim();
                    if (query !== "") {
                        handleSearch(); 
                    } else {
                        filteredData = [...allData];
                        renderTable(); 
                    }
                    
                    localStorage.setItem('tagManagerDB', JSON.stringify(freshData));
                    console.log("อัปเดตข้อมูลล่าสุดจากฐานข้อมูลเรียบร้อยแล้ว");
                }
                
                // กรณีเปิดเว็บครั้งแรกสุด ยังไม่มี Cache
                if (!cachedData) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('dataTable').style.display = 'table';
                    document.getElementById('pagination').style.display = 'flex';
                    localStorage.setItem('tagManagerDB', JSON.stringify(freshData));
                }

            } catch (error) {
                if (!cachedData) {
                    document.getElementById('loading').innerHTML = `<div class="text-red-500 font-bold">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>`;
                }
                console.log("ทำงานโหมด Offline หรือเชื่อมต่อไม่สำเร็จ");
            }
        };

        // =========================================================
        // ระบบค้นหา และ แบ่งหน้า (Pagination)
        // =========================================================
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            filteredData = allData.filter(item => {
                return (item['Model'] && item['Model'].toString().toLowerCase().includes(query)) ||
                       (item['Part name'] && item['Part name'].toString().toLowerCase().includes(query)) ||
                       (item['Part no'] && item['Part no'].toString().toLowerCase().includes(query));
            });
            currentPage = 1; // กลับไปหน้าแรกเสมอเมื่อค้นหา
            renderTable();
        }

        function changeItemsPerPage() {
            const val = document.getElementById('itemsPerPage').value;
            itemsPerPage = val === 'all' ? filteredData.length : parseInt(val);
            currentPage = 1;
            renderTable();
        }

        function prevPage() {
            if (currentPage > 1) { currentPage--; renderTable(); }
        }

        function nextPage() {
            const maxPage = Math.ceil(filteredData.length / itemsPerPage);
            if (currentPage < maxPage) { currentPage++; renderTable(); }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if(filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-6 text-gray-500">ไม่พบข้อมูล</td></tr>`;
                updatePaginationUI(0, 0, 0);
                return;
            }

            // คำนวณช่วงข้อมูลที่จะแสดง
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, filteredData.length);
            const currentData = filteredData.slice(startIndex, endIndex);

            currentData.forEach((item, index) => {
                const actualIndex = startIndex + index + 1;
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition duration-150";
                
                const itemJson = encodeURIComponent(JSON.stringify(item));

                tr.innerHTML = `
                    <td class="px-3 py-3 font-semibold text-center">${actualIndex}</td>
                    <td class="px-3 py-3">${item['Customer'] || '-'}</td>
                    <td class="px-3 py-3">${item['Model'] || '-'}</td>
                    <td class="px-3 py-3">${item['Part name'] || '-'}</td>
                    <td class="px-3 py-3">${item['Part no'] || '-'}</td>
                    <td class="px-3 py-3 text-center font-bold text-blue-600">${item['Qty pcs'] || '-'}</td>
                    <td class="px-3 py-3 text-center">
                        <div class="flex flex-wrap gap-1 justify-center">
                            <button onclick="selectForPreview('${itemJson}')" class="text-[11px] bg-blue-100 text-blue-700 px-2 py-1 rounded hover:bg-blue-200 font-semibold" title="ดูตัวอย่าง">
                                <i class="fa-solid fa-eye"></i> Preview
                            </button>
                            <button onclick="requestEdit('${item['Part no']}')" class="text-[11px] bg-yellow-100 text-yellow-700 px-2 py-1 rounded hover:bg-yellow-200 font-semibold" title="ขอแก้ไข">
                                <i class="fa-solid fa-pen-to-square"></i> แก้ไข
                            </button>
                            <button onclick="downloadTag('${itemJson}')" class="text-[11px] bg-green-100 text-green-700 px-2 py-1 rounded hover:bg-green-200 font-semibold" title="ดาวโหลด">
                                <i class="fa-solid fa-download"></i>
                            </button>
                            <button onclick="printDirectly('${itemJson}')" class="text-[11px] bg-gray-800 text-white px-2 py-1 rounded hover:bg-gray-900 font-semibold" title="พิมพ์ด่วน">
                                <i class="fa-solid fa-print"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            updatePaginationUI(startIndex + 1, endIndex, filteredData.length);
        }

        function updatePaginationUI(start, end, total) {
            document.getElementById('pageInfo').innerText = `แสดง ${start}-${end} จากทั้งหมด ${total} รายการ`;
            document.getElementById('btnPrev').disabled = currentPage === 1;
            document.getElementById('btnNext').disabled = end >= total;
        }

        // =========================================================
        // อัปเดตระบบดึงรูปจาก Google Drive (แก้ปัญหาภาพไม่แสดง)
        // =========================================================
        function extractDriveImageId(url) {
            if (!url) return null;
            const urlStr = String(url).trim();

            const fileMatch = urlStr.match(/\/file\/d\/([a-zA-Z0-9_-]+)/i);
            if (fileMatch && fileMatch[1]) return fileMatch[1];

            const openMatch = urlStr.match(/[?&]id=([a-zA-Z0-9_-]+)/i);
            if (openMatch && openMatch[1]) return openMatch[1];

            const genericMatch = urlStr.match(/[-\w]{25,}/);
            if (genericMatch) return genericMatch[0];

            return urlStr;
        }

        function getGoogleDriveImageTag(rawImageLink) {
            if (!rawImageLink) {
                return '<span class="text-gray-300 text-xs font-bold">ไม่มีรูปภาพ</span>';
            }

            const cleanLink = String(rawImageLink).trim();

            if (cleanLink.startsWith('data:image/')) {
                return `<img src="${cleanLink}" alt="Part Photo">`;
            }

            const fileIdOrUrl = extractDriveImageId(cleanLink);
            if (!fileIdOrUrl || fileIdOrUrl.length <= 5) {
                return '<span class="text-red-500 text-[10px] font-bold text-center">ลิงก์รูปไม่ถูกต้อง</span>';
            }

            if (fileIdOrUrl.startsWith('http://') || fileIdOrUrl.startsWith('https://')) {
                return `<img src="${fileIdOrUrl}" alt="Part Photo" referrerpolicy="no-referrer"
                             onerror="this.outerHTML='<span class=\'text-red-500 text-[10px] font-bold text-center\'>ลิงก์ไม่ถูกต้อง</span>'">`;
            }

            const candidates = [
                `https://drive.google.com/thumbnail?id=${fileIdOrUrl}&sz=w1000`,
                `https://drive.google.com/uc?export=view&id=${fileIdOrUrl}`,
                `https://drive.google.com/uc?export=download&id=${fileIdOrUrl}`,
                `https://lh3.googleusercontent.com/d/${fileIdOrUrl}=w1000`
            ];
            const encodedCandidates = JSON.stringify(candidates).replace(/"/g, '&quot;');

            return `<img src="${candidates[0]}" alt="Part Photo" referrerpolicy="no-referrer"
                         onerror="(function(img){
                            const urls = ${encodedCandidates};
                            const nextIndex = Number(img.dataset.tryIndex || '0') + 1;
                            if (nextIndex < urls.length) {
                                img.dataset.tryIndex = String(nextIndex);
                                img.src = urls[nextIndex];
                            } else {
                                img.outerHTML = '<span class=\'text-red-500 text-[10px] font-bold text-center\'>โหลดรูปไม่ได้<br>(ตรวจสิทธิ์แชร์ Google Drive)</span>';
                            }
                         })(this)">`;
        }

        function buildTagHTML(item, dateStr) {
            let rawImageLink = item['Photo base64'] || item['Image URL'] || item['Photo'];
            if (!rawImageLink) {
                for (let key in item) {
                    if (key.toLowerCase().includes('photo') || key.toLowerCase().includes('image') || key.toLowerCase().includes('base64')) {
                        rawImageLink = item[key];
                        break;
                    }
                }
            }

            const imageTag = getGoogleDriveImageTag(rawImageLink);

            const clearZero = (val) => {
                if (val === 0 || val === '0' || val === null || val === undefined || val === '') return '';
                return val;
            };

            const idCode = clearZero(item['ID Code']);
            const hasIdCode = String(idCode).trim() !== '';

            if (hasIdCode) {
                return `
                    <table class="tag-box tag-v2 bg-white">
                        <colgroup>
                            <col style="width:22%">
                            <col style="width:38%">
                            <col style="width:18%">
                            <col style="width:22%">
                        </colgroup>
                        <tr>
                            <td class="font-bold uppercase bg-gray-100 tag-top-label">Customer</td>
                            <td class="text-center font-bold text-lg uppercase tag-top-value" colspan="3">${clearZero(item['Customer'])}</td>
                        </tr>
                        <tr>
                            <td class="font-bold uppercase bg-gray-100">Model</td>
                            <td class="text-center font-bold uppercase tag-singleline">${clearZero(item['Model'])}</td>
                            <td class="font-bold text-center uppercase bg-gray-100">Date</td>
                            <td class="text-center font-bold tag-singleline">${dateStr}</td>
                        </tr>
                        <tr>
                            <td class="font-bold text-xs uppercase bg-gray-100">Part Name</td>
                            <td class="text-center font-bold text-sm uppercase tag-singleline" colspan="3">${clearZero(item['Part name'])}</td>
                        </tr>
                        <tr>
                            <td class="font-bold text-xs uppercase bg-gray-100">Part Number</td>
                            <td class="text-center font-bold uppercase part-no-value" colspan="3">${clearZero(item['Part no'])}</td>
                        </tr>
                        <tr>
                            <td class="font-bold uppercase bg-gray-100">Quantity</td>
                            <td class="text-center"><span class="font-bold text-xl">${clearZero(item['Qty pcs'])}</span> Pcs.</td>
                            <td class="tag-right-panel" colspan="2" rowspan="2">
                                <div class="tag-right-panel-inner">
                                    <div class="tag-id-head">ID Code.</div>
                                    <div class="tag-id-value">${idCode}</div>
                                    <div class="tag-img-container">${imageTag}</div>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="font-bold uppercase bg-gray-100">Operator</td>
                            <td></td>
                        </tr>
                        <tr>
                            <td class="font-bold bg-gray-50 tag-company-cell" colspan="4">
                                Thai Cubic Technology Co.,Ltd.
                            </td>
                        </tr>
                    </table>
                `;
            }

            return `
                <table class="tag-box tag-v1 bg-white">
                    <colgroup>
                        <col style="width:22%">
                        <col style="width:38%">
                        <col style="width:18%">
                        <col style="width:22%">
                    </colgroup>
                    <tr>
                        <td class="font-bold uppercase bg-gray-100 tag-top-label">Customer</td>
                        <td class="text-center font-bold text-lg uppercase tag-top-value" colspan="3">${clearZero(item['Customer'])}</td>
                    </tr>
                    <tr>
                        <td class="font-bold uppercase bg-gray-100">Model</td>
                        <td class="text-center font-bold uppercase tag-singleline">${clearZero(item['Model'])}</td>
                        <td class="font-bold text-center uppercase bg-gray-100">Date</td>
                        <td class="text-center font-bold tag-singleline">${dateStr}</td>
                    </tr>
                    <tr>
                        <td class="font-bold text-xs uppercase bg-gray-100">Part Name</td>
                        <td class="text-center font-bold text-sm uppercase tag-singleline" colspan="3">${clearZero(item['Part name'])}</td>
                    </tr>
                    <tr>
                        <td class="font-bold text-xs uppercase bg-gray-100">Part Number</td>
                        <td class="text-center font-bold uppercase part-no-value" colspan="3">${clearZero(item['Part no'])}</td>
                    </tr>
                    <tr>
                        <td class="font-bold uppercase bg-gray-100">Quantity</td>
                        <td class="text-center"><span class="font-bold text-xl">${clearZero(item['Qty pcs'])}</span> Pcs.</td>
                        <td class="text-center align-middle p-0" colspan="2" rowspan="2">
                            <div class="tag-img-container">${imageTag}</div>
                        </td>
                    </tr>
                    <tr>
                        <td class="font-bold uppercase bg-gray-100">Operator</td>
                        <td></td>
                    </tr>
                    <tr>
                        <td class="font-bold bg-gray-50 tag-company-cell" colspan="4">
                            Thai Cubic Technology Co.,Ltd.
                        </td>
                    </tr>
                </table>
            `;
        }

        // =========================================================
        // การทำงานของปุ่มต่างๆ
        // =========================================================
        
        function getFormattedDate() {
            const noDate = document.getElementById('noDateCheck').checked;
            if (noDate) return "";

            const dateInput = document.getElementById('printDate').value;
            if(!dateInput) return "";
            const d = new Date(dateInput);
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth()+1).padStart(2, '0')}/${d.getFullYear()}`;
        }

        function selectForPreview(encodedItem) {
            selectedItem = JSON.parse(decodeURIComponent(encodedItem));
            updatePreviewUI();
            
            const printBtn = document.getElementById('printBtn');
            printBtn.disabled = false;
            printBtn.classList.remove('bg-gray-300');
        }

        function updatePreviewUI() {
            if (!selectedItem) return;
            const dateStr = getFormattedDate();
            document.getElementById('single-preview-container').innerHTML = `
                <div class="w-full shadow-md bg-white">
                    ${buildTagHTML(selectedItem, dateStr)}
                </div>
            `;
        }

        function requestEdit(partNo) {
            window.open('https://forms.gle/sTVniBmxLPWSYE8S6', '_blank');
        }

        function downloadTag(encodedItem) {
            selectForPreview(encodedItem);
            alert("เคล็ดลับ: ในหน้าจอถัดไป ให้เลือกเครื่องพิมพ์เป็น 'Save as PDF' (บันทึกเป็น PDF)");
            triggerPrint();
        }

        function printDirectly(encodedItem) {
            selectForPreview(encodedItem);
            triggerPrint();
        }

        function triggerPrint() {
            if (!selectedItem) return;
            
            const dateStr = getFormattedDate();
            const printArea = document.getElementById('print-area');
            printArea.innerHTML = ''; 
            
            for(let i = 0; i < 10; i++) {
                const tagWrapper = document.createElement('div');
                tagWrapper.innerHTML = buildTagHTML(selectedItem, dateStr);
                tagWrapper.style.height = "100%"; 
                printArea.appendChild(tagWrapper);
            }

            setTimeout(() => {
                window.print();
            }, 500);
        }
    </script>
</body>
